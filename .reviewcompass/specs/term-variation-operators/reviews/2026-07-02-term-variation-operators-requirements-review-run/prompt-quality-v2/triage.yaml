  decision_reason: Section 1 asserts that Check 4 operationalizes the project-level
    `d_dt`/steady-state constraint. However, Section 7 defines Check 4 as checking
    for `indexing_neutrality`, and the `d_dt` check is entirely missing from the required
    checks list. This omits a stated review requirement and creates a logical contradiction
    that will confuse the model, likely causing it to misapply the indexing check
    or miss the `d_dt` constraint entirely.
