  target_location: §2 FR2 ステップ2–3（crossover step description）
  plain_language_summary: The crossover description uses ordinal expressions '(k+1)番目以降'
    (from the (k+1)-th onward) which, while not presupposing a specific 0- or 1-based
    scheme in natural Japanese, implicitly assumes 1-based counting since it pairs
    with 'leading k' and '(k+1)-th onward' as a clean partition. A reader could interpret
    this as implying 1-based indexing. The overview (§1) notes that indexing is deferred
    to design, but the body text does not reinforce this neutrality at the point of
    use.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '§7 check 4 (indexing_neutrality): While not an outright violation
    (no explicit ''[0, i-1]''-style arithmetic is used), the phrasing ''(k+1)番目以降''
    is marginally closer to 1-based convention than purely neutral language. A formulation
    such as ''the remaining instructions after the leading k'' would be unambiguously
    index-scheme-neutral.'
  applied_files: []
  superseded_by: null
