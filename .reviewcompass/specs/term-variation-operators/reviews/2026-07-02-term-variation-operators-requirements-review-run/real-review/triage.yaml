  severity_original: WARN
  severity_normalized: WARN
  target_location: §2 FR3 本文 — '選んだ命令文より前に生成された命令文の中から選ぶ'
  plain_language_summary: 'The mutation description says the new instruction''s arguments
    are drawn from instructions generated before the selected (replaced) instruction,
    following FR1''s generation method. However, for mutation the selected instruction
    already exists in the sequence — it was not ''generated'' at this point. The phrase
    ''前に生成された'' (generated before) imports seeding-time language into a post-hoc replacement
    context, which could be ambiguous: does ''before'' mean before in the original
    sequence order, or before in some re-generation order? This should be clarified
    to mean ''instructions that appear earlier in the sequence than the position of
    the replaced instruction.'''
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '§7 check 3 (algorithm_fidelity): The user-approved rule states
    ''mutation replaces one instruction''; the constraint on arguments is that they
    must reference earlier-generated instructions, which for mutation means earlier-positioned
    instructions in the existing sequence. The current phrasing is not wrong but is
    ambiguous enough to cause implementation uncertainty.'
  applied_files: []
  superseded_by: null
