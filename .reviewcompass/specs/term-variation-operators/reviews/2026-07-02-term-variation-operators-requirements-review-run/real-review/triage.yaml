  severity_original: ERROR
  severity_normalized: ERROR
  target_location: §2 FR2 受け入れ基準（crossover acceptance criteria）
  plain_language_summary: The crossover acceptance criteria states '命令文数がもとの親と一致し'
    (instruction count matches the original parent), but this is not guaranteed by
    the algorithm as described. Child 1 has (a - k) instructions from Parent 1 plus
    k instructions from Parent 2, giving total a instructions, which equals Parent
    1's count — but only Parent 1's count, not Parent 2's. Child 2 similarly has total
    b instructions. The acceptance criterion as written is ambiguous about which parent's
    count is being matched, and the claim that both children preserve their respective
    parent's instruction count is not stated clearly. More critically, the criterion
    does not verify the actual swap-prefix semantics (leading prefix exchanged), which
    is the user-approved algorithm rule.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '§7 check 3 (algorithm_fidelity): The user-approved rule is that
    crossover swaps a leading prefix of instructions between two parents. The acceptance
    criteria should confirm that child 1''s leading k instructions come from parent
    2 and child 2''s leading k instructions come from parent 1, verifying the prefix-swap
    property. The current acceptance criteria only checks instruction count and argument
    consistency, not the prefix-swap invariant itself, which is the defining property
    of the approved algorithm.'
