  severity_original: ERROR
  severity_normalized: ERROR
  target_location: §2 FR3 受け入れ基準 — '出力される子項は、元の親項と少なくとも1つの命令文が異なる'
  plain_language_summary: The acceptance criterion requires that the output child
    differs from the parent in at least one instruction. However, the algorithm as
    specified — replacing a randomly selected instruction with a newly generated instruction
    using the same method — does not guarantee the replacement produces a different
    instruction. A newly generated instruction could be identical to the one replaced.
    This acceptance criterion is stronger than what the algorithm guarantees and is
    not derivable from the user-approved mutation rule ('mutation replaces one instruction'),
    which says nothing about the replacement being necessarily distinct. The criterion
    either over-constrains the implementation or is misleading about what must be
    verified.
  final_label: null
  decision_status: human_required
  decision_actor: null
  decision_actor_type: human
  decision_at: null
  decision_reason: '§7 check 3 (algorithm_fidelity): The user-approved rule is that
    mutation replaces one instruction, not that the replacement must be observably
    different. Imposing a distinctness guarantee as an acceptance criterion is an
    unsupported addition not grounded in any upstream source material, and it could
    lead to implementation complexity (retry loops) not sanctioned by the requirements
    sources.'
  applied_files: []
  superseded_by: null
