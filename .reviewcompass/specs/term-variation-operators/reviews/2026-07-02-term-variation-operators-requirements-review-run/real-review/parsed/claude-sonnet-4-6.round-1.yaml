findings:
- severity: ERROR
  target_location: §2 FR2 受け入れ基準（crossover acceptance criteria）
  description: The crossover acceptance criteria states '命令文数がもとの親と一致し' (instruction
    count matches the original parent), but this is not guaranteed by the algorithm
    as described. Child 1 has (a - k) instructions from Parent 1 plus k instructions
    from Parent 2, giving total a instructions, which equals Parent 1's count — but
    only Parent 1's count, not Parent 2's. Child 2 similarly has total b instructions.
    The acceptance criterion as written is ambiguous about which parent's count is
    being matched, and the claim that both children preserve their respective parent's
    instruction count is not stated clearly. More critically, the criterion does not
    verify the actual swap-prefix semantics (leading prefix exchanged), which is the
    user-approved algorithm rule.
  rationale: '§7 check 3 (algorithm_fidelity): The user-approved rule is that crossover
    swaps a leading prefix of instructions between two parents. The acceptance criteria
    should confirm that child 1''s leading k instructions come from parent 2 and child
    2''s leading k instructions come from parent 1, verifying the prefix-swap property.
    The current acceptance criteria only checks instruction count and argument consistency,
    not the prefix-swap invariant itself, which is the defining property of the approved
    algorithm.'
- severity: ERROR
  target_location: §2 FR3 受け入れ基準 — '出力される子項は、元の親項と少なくとも1つの命令文が異なる'
  description: The acceptance criterion requires that the output child differs from
    the parent in at least one instruction. However, the algorithm as specified —
    replacing a randomly selected instruction with a newly generated instruction using
    the same method — does not guarantee the replacement produces a different instruction.
    A newly generated instruction could be identical to the one replaced. This acceptance
    criterion is stronger than what the algorithm guarantees and is not derivable
    from the user-approved mutation rule ('mutation replaces one instruction'), which
    says nothing about the replacement being necessarily distinct. The criterion either
    over-constrains the implementation or is misleading about what must be verified.
  rationale: '§7 check 3 (algorithm_fidelity): The user-approved rule is that mutation
    replaces one instruction, not that the replacement must be observably different.
    Imposing a distinctness guarantee as an acceptance criterion is an unsupported
    addition not grounded in any upstream source material, and it could lead to implementation
    complexity (retry loops) not sanctioned by the requirements sources.'
- severity: WARN
  target_location: §2 FR2 ステップ2–3（crossover step description）
  description: The crossover description uses ordinal expressions '(k+1)番目以降' (from
    the (k+1)-th onward) which, while not presupposing a specific 0- or 1-based scheme
    in natural Japanese, implicitly assumes 1-based counting since it pairs with 'leading
    k' and '(k+1)-th onward' as a clean partition. A reader could interpret this as
    implying 1-based indexing. The overview (§1) notes that indexing is deferred to
    design, but the body text does not reinforce this neutrality at the point of use.
  rationale: '§7 check 4 (indexing_neutrality): While not an outright violation (no
    explicit ''[0, i-1]''-style arithmetic is used), the phrasing ''(k+1)番目以降'' is
    marginally closer to 1-based convention than purely neutral language. A formulation
    such as ''the remaining instructions after the leading k'' would be unambiguously
    index-scheme-neutral.'
- severity: WARN
  target_location: §2 FR3 本文 — '選んだ命令文より前に生成された命令文の中から選ぶ'
  description: 'The mutation description says the new instruction''s arguments are
    drawn from instructions generated before the selected (replaced) instruction,
    following FR1''s generation method. However, for mutation the selected instruction
    already exists in the sequence — it was not ''generated'' at this point. The phrase
    ''前に生成された'' (generated before) imports seeding-time language into a post-hoc replacement
    context, which could be ambiguous: does ''before'' mean before in the original
    sequence order, or before in some re-generation order? This should be clarified
    to mean ''instructions that appear earlier in the sequence than the position of
    the replaced instruction.'''
  rationale: '§7 check 3 (algorithm_fidelity): The user-approved rule states ''mutation
    replaces one instruction''; the constraint on arguments is that they must reference
    earlier-generated instructions, which for mutation means earlier-positioned instructions
    in the existing sequence. The current phrasing is not wrong but is ambiguous enough
    to cause implementation uncertainty.'
- severity: INFO
  target_location: §2 FR4 — 子世代の生成ループ
  description: FR4 describes a child-generation loop with crossover and mutation probabilities
    as parameters. While §4 (scope-out) and §1 (overview) correctly defer the concrete
    probability values to design, FR4 itself does not explicitly state that default
    values are deferred. A brief note within FR4's acceptance criteria (e.g., '確率の既定値はdesign段階で定める')
    would make the deferral immediately visible to a reader of FR4 without needing
    to cross-reference §4.
  rationale: '§7 check 6 (deferred_items_not_invented): The deferral is correctly
    stated in §4 and §1, so this is not an ERROR. However, local visibility within
    FR4 would reduce the risk of a design author missing the deferral constraint.'
